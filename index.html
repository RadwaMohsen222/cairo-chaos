<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  padding: 0;
  width: 100vw;  
  height: 100vh; 
  overflow: hidden;
  background: rgb(219,224,241);
}

video {
  position: absolute;
  object-fit: contain;
  opacity: 0.85; 
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
  cursor: pointer;
}

video:hover {
  transform: scale(1.25); 
  z-index: 100 !important; 
  opacity: 1; 
}
</style>
</head>
<body>

<script>
const videos = [
  { src: "video1.mp4", type: "portrait", scale: 1.0 },
  { src: "video2.mp4", type: "portrait", scale: 1.2 },
  { src: "video3.mp4", type: "portrait", scale: 0.8 },
  { src: "video4.mp4", type: "portrait", scale: 1.5 },
  { src: "video5.mp4", type: "portrait", scale: 1.0 },
  { src: "video6.mp4", type: "portrait", scale: 1.1 },
  { src: "video7.mp4", type: "landscape", scale: 1.0 },
  { src: "video8.mp4", type: "landscape", scale: 1.3 },
  { src: "video9.mp4", type: "landscape", scale: 0.9 },
  { src: "video10.mp4", type: "landscape", scale: 1.4 }
];

const globalBaseScale = 1.0; 
const paddingLeft = 2;   
const paddingRight = 2;  
const paddingTop = 2;    
const paddingBottom = 2; 

// --- GRID SETTINGS FOR SCATTERING ---
const cols = 5; // 5 columns
const rows = 2; // 2 rows (5x2 = 10 spots for your 10 videos)

videos.forEach((vidData, index) => {
  const vid = document.createElement("video");
  vid.src = vidData.src;
  vid.autoplay = true;
  vid.muted = true;
  vid.loop = true;
  vid.playsInline = true;

  let baseWidthVW = vidData.type === "portrait" ? 10 : 16;
  let finalWidth = baseWidthVW * vidData.scale * globalBaseScale;
  vid.style.width = finalWidth + "vw";

  // Calculate the size of each invisible grid cell
  let cellWidthVW = 100 / cols; 
  let cellHeightVH = 100 / rows; 

  // Figure out which cell this specific video belongs in
  let col = index % cols;
  let row = Math.floor(index / cols);

  // Calculate how much random wiggle room it has inside its cell without overflowing
  let maxOffsetX = cellWidthVW - finalWidth; 
  let maxOffsetY = cellHeightVH - 35; // 35vh is roughly the max height a video will take

  // Prevent errors if the video is scaled up larger than the cell itself
  if (maxOffsetX < 0) maxOffsetX = 0;
  if (maxOffsetY < 0) maxOffsetY = 0;

  // Add the base cell position + the random wiggle room
  let randomLeft = (col * cellWidthVW) + (Math.random() * maxOffsetX);
  let randomTop = (row * cellHeightVH) + (Math.random() * maxOffsetY);

  // Keep it safely inside the absolute edges of the screen
  if (randomLeft < paddingLeft) randomLeft = paddingLeft;
  if (randomLeft > 100 - paddingRight - finalWidth) randomLeft = 100 - paddingRight - finalWidth;
  if (randomTop < paddingTop) randomTop = paddingTop;
  if (randomTop > 100 - paddingBottom - 35) randomTop = 100 - paddingBottom - 35;

  vid.style.left = randomLeft + "vw";
  vid.style.top = randomTop + "vh";
  
  vid.style.zIndex = Math.floor(Math.random() * 20);

  document.body.appendChild(vid);
});
</script>

</body>
</html>
